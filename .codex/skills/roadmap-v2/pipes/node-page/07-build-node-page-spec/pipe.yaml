id: 07-build-node-page-spec
kind: deterministic
input: input.schema.json
action: python:scripts.pipe_actions:build_node_page_spec
validation: python:scripts.pipe_actions:validate_page_spec
output: output.schema.json
retry:
  max_attempts: 1
  on_fail: fail
artifacts:
  reads:
    - node-spec.json
  writes:
    - nodes/<level>/<node-slug>/page-spec.json
blocks_pipeline_on_fail: true
