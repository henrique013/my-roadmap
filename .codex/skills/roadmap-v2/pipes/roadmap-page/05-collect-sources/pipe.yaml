id: 05-collect-sources
kind: llm
input: input.schema.json
action: prompt.md
validation: python:scripts.pipe_actions:validate_research_pack
output: output.schema.json
retry:
  max_attempts: 2
  on_fail: repair_same_scope
artifacts:
  reads:
    - research-plan.json
  writes:
    - research-pack.json
blocks_pipeline_on_fail: true
