id: 07-build-roadmap-spec
kind: deterministic
input: input.schema.json
action: python:scripts.pipe_actions:build_roadmap_spec
validation: none
output: output.schema.json
retry:
  max_attempts: 1
  on_fail: fail
artifacts:
  reads:
    - roadmap-draft.json
  writes:
    - roadmap-spec.json
blocks_pipeline_on_fail: true
