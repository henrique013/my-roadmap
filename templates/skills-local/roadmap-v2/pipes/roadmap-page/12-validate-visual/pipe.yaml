id: 12-validate-visual
kind: deterministic
input: input.schema.json
action: python:scripts.pipe_actions:run_visual_check
validation: none
output: output.schema.json
retry:
  max_attempts: 1
  on_fail: fail
artifacts:
  reads:
    - .pipeline/visual/checks.json
  writes:
    - .pipeline/visual/checks.json
blocks_pipeline_on_fail: true
